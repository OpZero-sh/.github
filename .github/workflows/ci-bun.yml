# Reusable CI for Bun repos (CodeZ, CodeZero, codez-hub, uat, OpZ_cli, OpZero.sh).
# Why reusable: 13 independent repos should not each hand-maintain the same
# install/typecheck/test/build sequence. Callers pin this to a tag/SHA so an edit
# here is a deliberate, versioned change rather than a silent fleet-wide one.
#
# Caller example (.github/workflows/ci.yml in a service repo):
#   jobs:
#     ci:
#       uses: opzero-sh/.github/.github/workflows/ci-bun.yml@v1
#       with:
#         bun-version: "1.3.6"
#         run-build: true
name: ci-bun

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory to install and run scripts in.
        type: string
        default: "."
      bun-version:
        # Pinned, never "latest": a moving Bun version makes CI non-reproducible
        # and silently changes behaviour between unrelated PRs.
        description: Exact Bun version to install.
        type: string
        default: "1.3.6"
      run-typecheck:
        type: boolean
        default: true
      run-lint:
        type: boolean
        default: false
      run-test:
        type: boolean
        default: true
      run-build:
        type: boolean
        default: false
      build-script:
        description: Package script name to run when run-build is true.
        type: string
        default: "build"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      # TODO(dependabot): pin these to full commit SHAs; dependabot.yml keeps majors current.
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      # --frozen-lockfile: CI must fail on lockfile drift, never silently resolve
      # a different dependency tree than what was committed.
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        if: ${{ inputs.run-typecheck }}
        run: bun run typecheck
      - name: Lint
        if: ${{ inputs.run-lint }}
        run: bun run lint
      - name: Test
        if: ${{ inputs.run-test }}
        run: bun test
      - name: Build
        if: ${{ inputs.run-build }}
        run: bun run ${{ inputs.build-script }}
