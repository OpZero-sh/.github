<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 630" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect x="8" y="8" width="964" height="614" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

