    <rect x="252" y="480" width="156" height="24" rx="6" fill="#2b2410" stroke="#9e8224"/>
    <text x="330" y="496" text-anchor="middle" fill="#e0c879">Codex · soon</text>
    <rect x="252" y="512" width="156" height="24" rx="6" fill="#2b2410" stroke="#9e8224"/>
    <text x="330" y="528" text-anchor="middle" fill="#e0c879">Gemini · soon</text>
    <!-- Cloud -->
    <rect x="456" y="448" width="156" height="24" rx="6" fill="#1c2440" stroke="#4f5bd5"/>
    <text x="534" y="464" text-anchor="middle" fill="#e6edf3">Claude Code</text>
    <rect x="456" y="480" width="156" height="24" rx="6" fill="#2b2410" stroke="#9e8224"/>
    <text x="534" y="496" text-anchor="middle" fill="#e0c879">Codex · soon</text>
    <rect x="456" y="512" width="156" height="24" rx="6" fill="#2b2410" stroke="#9e8224"/>
