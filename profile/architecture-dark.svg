  <text x="179" y="350" text-anchor="middle" font-size="11" fill="#9aa4b2">operator, not router</text>

  <rect x="347" y="292" width="286" height="66" rx="10" fill="#0f2c1f" stroke="#3a9d6e"/>
  <text x="490" y="318" text-anchor="middle" font-size="15" font-weight="700" fill="#e6edf3">CodeZ</text>
