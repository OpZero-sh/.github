    <text x="121" y="90" text-anchor="middle" fill="#9aa4b2">chat + Code</text>

    <rect x="220" y="52" width="170" height="46" rx="8" fill="#1c2440" stroke="#4f5bd5"/>
    <text x="305" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#e6edf3">ChatGPT</text>
