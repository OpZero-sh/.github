  <rect x="658" y="292" width="286" height="66" rx="10" fill="#241636" stroke="#8b5fc7"/>
  <text x="801" y="318" text-anchor="middle" font-size="15" font-weight="700" fill="#e6edf3">Deploy · OpZero.sh</text>
  <text x="801" y="335" text-anchor="middle" font-size="11" fill="#9aa4b2">36 MCP tools</text>
  <text x="801" y="350" text-anchor="middle" font-size="11" fill="#9aa4b2">sites · apps · MCP servers</text>

  <!-- connectors to machines / deploy targets -->
  <line x1="263" y1="358" x2="263" y2="394" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="801" y1="358" x2="801" y2="394" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <text x="36" y="388" font-size="12" font-weight="700" letter-spacing="0.5" fill="#8b949e">YOUR MACHINES · each runs the agent sessions the hub drives</text>
  <text x="660" y="388" font-size="12" font-weight="700" letter-spacing="0.5" fill="#8b949e">DEPLOY TARGETS</text>

