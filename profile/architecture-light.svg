    <text x="857" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">opzero CLI</text>
    <text x="857" y="90" text-anchor="middle" fill="#6b7280">+ local MCP</text>
  </g>

  <line x1="490" y1="98" x2="490" y2="120" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>

