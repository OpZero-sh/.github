  <text x="490" y="164" text-anchor="middle" font-size="11" fill="#6b7280">one login · one token family · validate a Bearer token</text>

  <line x1="490" y1="174" x2="490" y2="196" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>

