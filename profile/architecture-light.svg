  <rect x="250" y="481" width="170" height="22" rx="6" fill="#E6E9F7" stroke="#C3C9EC"/><text x="260" y="496" font-size="11" font-weight="600" fill="#3A3F73">Claude Code · #2</text>
  <rect x="250" y="509" width="170" height="22" rx="6" fill="#FBF6D9" stroke="#E8DFA8"/><text x="260" y="524" font-size="11" font-weight="600" fill="#8A7A2E">Codex · soon</text>

