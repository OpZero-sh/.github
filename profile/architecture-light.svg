    <rect x="252" y="480" width="156" height="24" rx="6" fill="#fdf7d0" stroke="#e6cf5a"/>
    <text x="330" y="496" text-anchor="middle" fill="#8a6d1a">Codex · soon</text>
    <rect x="252" y="512" width="156" height="24" rx="6" fill="#fdf7d0" stroke="#e6cf5a"/>
    <text x="330" y="528" text-anchor="middle" fill="#8a6d1a">Gemini · soon</text>
    <!-- Cloud -->
    <rect x="456" y="448" width="156" height="24" rx="6" fill="#eef0fb" stroke="#b9b9e8"/>
    <text x="534" y="464" text-anchor="middle" fill="#1f2937">Claude Code</text>
    <rect x="456" y="480" width="156" height="24" rx="6" fill="#fdf7d0" stroke="#e6cf5a"/>
    <text x="534" y="496" text-anchor="middle" fill="#8a6d1a">Codex · soon</text>
    <rect x="456" y="512" width="156" height="24" rx="6" fill="#fdf7d0" stroke="#e6cf5a"/>
