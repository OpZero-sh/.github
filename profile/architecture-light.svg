  <text x="179" y="350" text-anchor="middle" font-size="11" fill="#6b7280">operator, not router</text>

  <rect x="347" y="292" width="286" height="66" rx="10" fill="#e6f7ee" stroke="#4fb985"/>
  <text x="490" y="318" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">CodeZ</text>
  <text x="490" y="335" text-anchor="middle" font-size="11" fill="#6b7280">~18 MCP tools, on a machine</text>
  <text x="490" y="350" text-anchor="middle" font-size="11" fill="#6b7280">makes an agent observable + drivable</text>

  <rect x="658" y="292" width="286" height="66" rx="10" fill="#f2eafd" stroke="#a779e0"/>
  <text x="801" y="318" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">Deploy · OpZero.sh</text>
  <text x="801" y="335" text-anchor="middle" font-size="11" fill="#6b7280">36 MCP tools</text>
  <text x="801" y="350" text-anchor="middle" font-size="11" fill="#6b7280">sites · apps · MCP servers</text>

  <!-- connectors to machines / deploy targets -->
  <line x1="263" y1="358" x2="263" y2="394" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="801" y1="358" x2="801" y2="394" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <text x="36" y="388" font-size="12" font-weight="700" letter-spacing="0.5" fill="#6b7280">YOUR MACHINES · each runs the agent sessions the hub drives</text>
  <text x="660" y="388" font-size="12" font-weight="700" letter-spacing="0.5" fill="#6b7280">DEPLOY TARGETS</text>

