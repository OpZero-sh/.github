  <g font-size="11">
    <rect x="36"  y="52" width="170" height="46" rx="8" fill="#eef0fb" stroke="#b9b9e8"/>
    <text x="121" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Claude</text>
    <text x="121" y="90" text-anchor="middle" fill="#6b7280">chat + Code</text>

    <rect x="220" y="52" width="170" height="46" rx="8" fill="#eef0fb" stroke="#b9b9e8"/>
    <text x="305" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">ChatGPT</text>
    <text x="305" y="90" text-anchor="middle" fill="#6b7280">connects today</text>

    <rect x="404" y="52" width="170" height="46" rx="8" fill="#eef0fb" stroke="#b9b9e8"/>
    <text x="489" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Cursor · Copilot</text>
